# GitHub Actions workflow : build UI + TS on Linux and produce openclaw-main.zip artifact
on:
  workflow_dispatch: {}

jobs:
  build-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Ensure corepack (pnpm) available
        run: |
          corepack enable
          corepack prepare pnpm@10.23.0 --activate || true
          pnpm -v

      - name: Install dependencies (pnpm)
        working-directory: openclaw-main
        run: |
          pnpm install --no-frozen-lockfile

      - name: Run UI build if present
        working-directory: openclaw-main
        run: |
          if jq -e '.scripts["ui:build"]' package.json >/dev/null 2>&1; then
            echo "ui:build detected -> running pnpm run ui:build"
            pnpm run ui:build
          else
            echo "ui:build not found -> skipping UI build"
          fi

      - name: Run TS build if present
        working-directory: openclaw-main
        run: |
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            echo "build detected -> running npm run build"
            npm run --prefix . run build || echo "npm run build failed (continue)"
          else
            echo "build script not found -> skipping TS build"
          fi

      - name: Ensure control-ui placeholder if missing (optional)
        run: |
          # If UI build produced no control-ui, create a minimal placeholder so HF won't complain
          if [ ! -f openclaw-main/dist/control-ui/index.html ]; then
            mkdir -p openclaw-main/dist/control-ui
            cat > openclaw-main/dist/control-ui/index.html <<'HTML'
            <!doctype html>
            <html lang="fr">
            <head><meta charset="utf-8"/><title>OpenClaw Control UI (placeholder)</title></head>
            <body><h1>Control UI placeholder</h1><p>Replace with real UI build when available.</p></body>
            </html>
            HTML
            echo "placeholder control-ui created"
          else
            echo "control-ui exists"
          fi

      - name: Create zip artifact
        run: |
          rm -f openclaw-main.zip
          zip -r openclaw-main.zip openclaw-main

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-main.zip
          path: openclaw-main.zip
