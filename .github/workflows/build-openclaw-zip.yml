name: Build OpenClaw Turbo
on:
  workflow_dispatch:

jobs:
  build-and-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create Clean Zip
        run: |
          # On supprime les vieux ZIP s'ils existent
          rm -f openclaw-main.zip
          # On compresse tout sauf le dossier .git pour gagner de la place
          zip -r openclaw-main.zip . -x "*.git*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-turbo-package
          path: openclaw-main.zip
